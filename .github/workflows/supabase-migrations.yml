name: Apply Supabase migrations

# Auto-trigger temporarily disabled while we reconcile pre-existing
# migration-history drift. The remote supabase_migrations table contains
# ~120 entries (applied via the management API with 14-digit timestamps),
# while the repo's older migration files use 8-digit prefixes that the
# Supabase CLI silently ignores. Until those filenames are reconciled
# (planned: 29 May 2026 morning session), enabling `on: push` causes the
# workflow to fail on every merge to main. Manual dispatch only for now.
#
# To re-enable auto-apply once the drift is fixed, restore:
#   push:
#     branches: [main]
#     paths: ['supabase/migrations/**']
on:
  workflow_dispatch:

# Prevent two pushes from racing each other against prod.
concurrency:
  group: supabase-migrations-prod
  cancel-in-progress: false

jobs:
  apply:
    name: supabase db push
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: qupjaanyhnuvlexkwtpq
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify required secrets are set
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN secret is not set. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          if [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::error::SUPABASE_DB_PASSWORD secret is not set. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Link to production project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Apply migrations
        run: supabase db push --linked --include-all -p "$SUPABASE_DB_PASSWORD"
