name: Apply Supabase migrations

# Auto-apply migrations on every push to main that touches
# supabase/migrations/**. Re-enabled 25 Jun 2026 after the migration-history
# drift reconciliation:
#   • PR #145 renamed legacy 8-digit migration files to 14-digit ledger
#     versions (54 renames).
#   • PR #144 added a verified baseline so fresh databases reach prod parity.
#   • All Group C SQL (22 migrations) was applied via the Supabase management
#     API on 25 Jun 2026 and the ledger now matches the repo on the active
#     migration set.
# workflow_dispatch is kept as a manual fallback / re-run mechanism.
on:
  push:
    branches: [main]
    paths: ['supabase/migrations/**']
  workflow_dispatch:

# Prevent two pushes from racing each other against prod.
concurrency:
  group: supabase-migrations-prod
  cancel-in-progress: false

jobs:
  apply:
    name: supabase db push
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: qupjaanyhnuvlexkwtpq
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify required secrets are set
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN secret is not set. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          if [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::error::SUPABASE_DB_PASSWORD secret is not set. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Link to production project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Apply migrations
        run: supabase db push --linked --include-all -p "$SUPABASE_DB_PASSWORD"
