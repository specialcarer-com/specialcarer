name: Install Supabase email templates

# Manual-dispatch only. Run this whenever supabase/email-templates/*.html changes
# and you want to push the new versions to the live Supabase project.
#
# Required repo secret: SUPABASE_ACCESS_TOKEN  (already configured)
# Project ref is hard-coded below — change here if the Supabase project ref ever changes.

on:
  workflow_dispatch:
    inputs:
      project_ref:
        description: "Supabase project ref"
        required: true
        default: "qupjaanyhnuvlexkwtpq"

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install email templates via Supabase Management API
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ github.event.inputs.project_ref }}
        run: |
          python scripts/email-templates/install.py
